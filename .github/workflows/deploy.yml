name: Deploy to Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: hostinger-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy production
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare deploy bundle
        run: |
          mkdir -p .deploy
          rsync -a --delete \
            --exclude='.deploy' \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.env' \
            --exclude='node_modules' \
            --exclude='vendor' \
            --exclude='storage/app/*' \
            --exclude='storage/framework/cache/*' \
            --exclude='storage/framework/sessions/*' \
            --exclude='storage/framework/testing/*' \
            --exclude='storage/framework/views/*' \
            --exclude='storage/logs/*' \
            ./ .deploy/

          cp -a public/. .deploy/

          cat > .deploy/index.php <<'PHP'
          <?php

          use Illuminate\Contracts\Http\Kernel;
          use Illuminate\Http\Request;

          define('LARAVEL_START', microtime(true));

          require __DIR__.'/vendor/autoload.php';

          $app = require_once __DIR__.'/bootstrap/app.php';
          $app->usePublicPath(__DIR__);

          $kernel = $app->make(Kernel::class);

          $response = $kernel->handle(
              $request = Request::capture()
          )->send();

          $kernel->terminate($request, $response);
          PHP

          cat > .deploy/.htaccess <<'HTACCESS'
          DirectoryIndex index.php

          <FilesMatch "(^\.|\.env$|composer\.(json|lock)$|phpunit\.xml$)">
              Require all denied
          </FilesMatch>

          <IfModule mod_rewrite.c>
              <IfModule mod_negotiation.c>
                  Options -MultiViews -Indexes
              </IfModule>

              RewriteEngine On

              RewriteRule (^|/)\. - [F,L]
              RewriteRule ^(?:app|bootstrap|config|database|public|resources|routes|storage|tests|vendor)(?:/|$) - [F,L,NC]
              RewriteRule ^(?:artisan|composer\.(?:json|lock)|package(?:-lock)?\.json|phpunit\.xml|README\.md|vite\.config\.js)$ - [F,L,NC]

              RewriteCond %{REQUEST_FILENAME} !-d
              RewriteCond %{REQUEST_FILENAME} !-f
              RewriteRule ^ index.php [L]
          </IfModule>
          HTACCESS

      - name: Upload files
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          port: ${{ secrets.HOSTINGER_PORT }}
          username: ${{ secrets.HOSTINGER_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          source: ".deploy/*,.deploy/.htaccess"
          target: ${{ secrets.HOSTINGER_DEPLOY_PATH }}
          strip_components: 1
          overwrite: true

      - name: Run Laravel deploy commands
        uses: appleboy/ssh-action@v1
        env:
          HOSTINGER_ENV_BASE64: ${{ secrets.HOSTINGER_ENV_BASE64 }}
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          port: ${{ secrets.HOSTINGER_PORT }}
          username: ${{ secrets.HOSTINGER_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          envs: HOSTINGER_ENV_BASE64
          script: |
            set -e
            cd "${{ secrets.HOSTINGER_DEPLOY_PATH }}"

            if [ ! -f .env ]; then
              if [ -z "${HOSTINGER_ENV_BASE64:-}" ]; then
                echo ".env is missing on the server. Create it or set HOSTINGER_ENV_BASE64."
                exit 1
              fi

              printf '%s' "$HOSTINGER_ENV_BASE64" | base64 -d > .env
              chmod 600 .env
            fi

            mkdir -p \
              storage/app \
              storage/framework/cache \
              storage/framework/sessions \
              storage/framework/testing \
              storage/framework/views \
              storage/logs \
              bootstrap/cache \
              database

            if [ ! -f database/database.sqlite ]; then
              touch database/database.sqlite
            fi

            composer install --no-dev --optimize-autoloader --no-interaction
            php artisan optimize:clear
            php artisan migrate --force
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
